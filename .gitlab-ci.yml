stages:
  - verify

default:
  interruptible: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push

variables:
  NODE_VERSION: "22.12.0"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"

code_quality:
  stage: verify
  timeout: 20 minutes
  before_script:
    - pwd
    - |
      if ! command -v nvm >/dev/null 2>&1; then
        if [ -z "${NVM_DIR:-}" ] || [ ! -s "${NVM_DIR}/nvm.sh" ]; then
          echo "Runner 已声明安装 NVM，但当前 Shell 未加载；请设置 NVM_DIR。" >&2
          exit 1
        fi
        . "${NVM_DIR}/nvm.sh"
      fi
      nvm install "${NODE_VERSION}"
      nvm use "${NODE_VERSION}"
      node --version
      npm --version
    - npm ci --prefer-offline
  script:
    # 仅执行静态代码校验和自动化测试，任一命令失败都会阻止流水线通过。
    # 不执行应用构建或 Electron 打包。
    - npm run lint
    - npm run typecheck
    - npm test
